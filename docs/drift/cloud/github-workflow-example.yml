name: Tusk Drift

# In this example, `<repo_root>/backend/` is the service
# root directory to be tested by Tusk Drift.

on:
  pull_request:
    paths:
      - "backend/**"
  # Push to main is required for validating new traces
  # before adding them to the test suite.
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  tusk-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Tusk Drift trace tests
        # The action installs the CLI, sets up depedencies, and runs:
        # tusk run -c -p --ci --validate-suite-if-default-branch
        uses: Use-Tusk/drift-action@v1
        with:
          working-directory: ./backend
          cache-key: ${{ runner.os }}-tusk-drift-${{ hashFiles('backend/.tusk/config.yaml') }}
          api-key: ${{ secrets.TUSK_API_KEY }}
